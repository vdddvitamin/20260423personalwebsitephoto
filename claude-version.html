<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的相册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.2);
    --text-primary: #1A1A18;
    --text-secondary: #888880;
    --font-serif: 'Noto Serif SC', serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: var(--font-serif); min-height: 100vh; }

  header {
    padding: 3rem 2.5rem 2rem;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
  }
  .site-title { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 300; letter-spacing: 0.04em; line-height: 1; }
  .site-meta { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 0.08em; text-align: right; line-height: 1.8; }

  main { padding: 0 2.5rem 4rem; }

  .cat-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 1.6rem 0 1.4rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.8rem;
  }
  .cat-btn {
    padding: 6px 16px; border-radius: 99px;
    border: 0.5px solid var(--border-hover);
    background: transparent; cursor: pointer;
    font-family: var(--font-serif); font-size: 0.82rem;
    color: var(--text-secondary); letter-spacing: 0.03em;
    transition: all 0.15s ease;
  }
  .cat-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }
  .cat-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }

  .album-card {
    cursor: pointer; background: var(--surface);
    border: 0.5px solid var(--border); border-radius: 4px; overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s ease;
    animation: fadeIn 0.2s ease;
  }
  .album-card:hover { transform: translateY(-3px); border-color: var(--border-hover); }
  .album-card.hidden { display: none; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .album-cover { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .album-cover-placeholder { width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

  .album-info { padding: 0.9rem 1rem 1rem; border-top: 0.5px solid var(--border); }
  .album-name { font-size: 0.95rem; font-weight: 400; letter-spacing: 0.02em; }
  .album-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
  .album-count { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-secondary); letter-spacing: 0.06em; }
  .album-tag { font-size: 0.65rem; color: var(--text-secondary); border: 0.5px solid var(--border-hover); border-radius: 99px; padding: 1px 7px; letter-spacing: 0.04em; }

  .lightbox-overlay { display: none; position: fixed; inset: 0; background: rgba(18,18,16,0.96); z-index: 200; flex-direction: column; }
  .lightbox-overlay.open { display: flex; }

  .lb-header { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 1.5rem; flex-shrink: 0; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
  .lb-left { display: flex; align-items: center; gap: 10px; }
  .lb-title { font-size: 1rem; font-weight: 300; color: #fff; letter-spacing: 0.04em; }
  .lb-tag { font-size: 0.65rem; color: rgba(255,255,255,0.5); border: 0.5px solid rgba(255,255,255,0.2); border-radius: 99px; padding: 2px 9px; letter-spacing: 0.06em; }
  .lb-right { display: flex; align-items: center; gap: 1rem; }
  .lb-counter { font-family: var(--font-mono); font-size: 0.65rem; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }
  .lb-close { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .lb-close:hover { background: rgba(255,255,255,0.2); }
  .lb-close svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 1.5; stroke-linecap: round; }

  .lb-stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 1.5rem 4rem; }
  .lb-img { max-width: 100%; max-height: calc(100vh - 170px); object-fit: contain; display: block; border-radius: 2px; }
  .lb-placeholder { width: 360px; max-width: 80vw; aspect-ratio: 4/3; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }

  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .lb-nav:hover { background: rgba(255,255,255,0.18); }
  .lb-nav svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .lb-prev { left: 1rem; } .lb-next { right: 1rem; }

  .lb-filmstrip { display: flex; gap: 6px; padding: 0.9rem 1.5rem; overflow-x: auto; flex-shrink: 0; border-top: 0.5px solid rgba(255,255,255,0.08); scrollbar-width: none; }
  .lb-filmstrip::-webkit-scrollbar { display: none; }
  .lb-thumb { width: 52px; height: 52px; flex-shrink: 0; object-fit: cover; border-radius: 2px; cursor: pointer; opacity: 0.4; transition: opacity 0.15s; border: 1.5px solid transparent; }
  .lb-thumb-placeholder { width: 52px; height: 52px; flex-shrink: 0; border-radius: 2px; cursor: pointer; opacity: 0.4; transition: opacity 0.15s; border: 1.5px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .lb-thumb.active, .lb-thumb-placeholder.active { opacity: 1; border-color: rgba(255,255,255,0.7); }

  @media (max-width: 600px) {
    header { padding: 2rem 1.2rem 1.5rem; flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    main { padding: 0 1.2rem 3rem; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
    .lb-stage { padding: 1rem 3rem; }
    .lb-prev { left: 0.4rem; } .lb-next { right: 0.4rem; }
  }
</style>
</head>
<body>

<header>
  <h1 class="site-title">我的相册</h1>
  <div class="site-meta">
    <div id="count-label"></div>
    <div>PHOTO GALLERY</div>
  </div>
</header>

<main>
  <div class="cat-bar" id="cat-bar"></div>
  <div class="grid" id="grid"></div>
</main>

<div class="lightbox-overlay" id="lightbox">
  <div class="lb-header">
    <div class="lb-left">
      <span class="lb-title" id="lb-title"></span>
      <span class="lb-tag" id="lb-tag"></span>
    </div>
    <div class="lb-right">
      <span class="lb-counter" id="lb-counter"></span>
      <button class="lb-close" id="lb-close" aria-label="关闭">
        <svg viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
      </button>
    </div>
  </div>
  <div class="lb-stage" id="lb-stage">
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="上一张">
      <svg viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12"/></svg>
    </button>
    <div id="lb-main"></div>
    <button class="lb-nav lb-next" id="lb-next" aria-label="下一张">
      <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
    </button>
  </div>
  <div class="lb-filmstrip" id="lb-filmstrip"></div>
</div>

<script>
/* ================================================================
   ★ 相册数据 — 修改这里
   ================================================================

   category 字段决定分类标签，名字相同自动归为同一组。
   想加新分类直接写新名字就行，按钮会自动出现。

   图片路径：
     同文件夹直接写文件名：  "001.jpg"
     子文件夹：             "photos/旅游/001.jpg"
     网络图片：             "https://..."
   ================================================================ */



const albums = [
  {
    name: "京都之旅",
    category: "旅游",
    cover: "",
    photos: ["", "", "", "", ""],
    emoji: "⛩️",
    coverColor: "#E8DDD0"
  },

  {
  name: "京都之旅2",
  cover: "photos/album1/IMG_1713.JPG",   // 封面
  photos: [
    "photos/album1/IMG_1713.JPG",
    "photos/album1/IMG_1714.jpg",
    "photos/album1/IMG_1715.jpg",
  ]
  },

  {
    name: "北海道雪景",
    category: "旅游",
    cover: "",
    photos: ["", "", "", ""],
    emoji: "❄️",
    coverColor: "#D8E8F0"
  },
  {
    name: "家人聚餐",
    category: "家庭",
    cover: "",
    photos: ["", "", "", ""],
    emoji: "🏠",
    coverColor: "#F0DDE0"
  },
  {
    name: "宝宝成长",
    category: "家庭",
    cover: "",
    photos: ["", "", "", "", "", ""],
    emoji: "🌸",
    coverColor: "#FAE8F0"
  },
  {
    name: "街头随拍",
    category: "日常",
    cover: "",
    photos: ["", "", "", "", ""],
    emoji: "🏙️",
    coverColor: "#D8D8D5"
  },
  {
    name: "咖啡时光",
    category: "日常",
    cover: "",
    photos: ["", "", ""],
    emoji: "☕",
    coverColor: "#EAE0D5"
  },
  {
    name: "山野徒步",
    category: "自然",
    cover: "",
    photos: ["", "", "", ""],
    emoji: "🌿",
    coverColor: "#D0E8D8"
  },
  {
    name: "海边日落",
    category: "自然",
    cover: "",
    photos: ["", "", "", "", ""],
    emoji: "🌊",
    coverColor: "#CDE8F0"
  },
];

/* 以下不需要修改 */
const grid = document.getElementById('grid');
const catBar = document.getElementById('cat-bar');
const lightbox = document.getElementById('lightbox');
const lbTitle = document.getElementById('lb-title');
const lbTag = document.getElementById('lb-tag');
const lbCounter = document.getElementById('lb-counter');
const lbMain = document.getElementById('lb-main');
const lbFilmstrip = document.getElementById('lb-filmstrip');

let curCat = '全部', curAlbum = 0, curIdx = 0;

const categories = ['全部', ...new Set(albums.map(a => a.category))];
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === '全部' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    curCat = cat;
    catBar.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
    filterGrid();
  };
  catBar.appendChild(btn);
});

albums.forEach((album, ai) => {
  const card = document.createElement('div');
  card.className = 'album-card';
  card.dataset.category = album.category;
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  const hasCover = album.cover && album.cover.trim() !== '';
  const coverHTML = hasCover
    ? `<img class="album-cover" src="${album.cover}" alt="${album.name}封面" loading="lazy">`
    : `<div class="album-cover-placeholder" style="background:${album.coverColor}">${album.emoji}</div>`;
  card.innerHTML = `${coverHTML}
    <div class="album-info">
      <div class="album-name">${album.name}</div>
      <div class="album-bottom">
        <span class="album-count">${album.photos.length} 张照片</span>
        <span class="album-tag">${album.category}</span>
      </div>
    </div>`;
  card.onclick = () => openAlbum(ai, 0);
  card.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') openAlbum(ai, 0); };
  grid.appendChild(card);
});

function filterGrid() {
  let visible = 0;
  grid.querySelectorAll('.album-card').forEach((card, i) => {
    const show = curCat === '全部' || albums[i].category === curCat;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('count-label').textContent = visible + ' 个相册';
}
filterGrid();

function openAlbum(ai, idx) {
  curAlbum = ai; curIdx = idx;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
  renderLightbox();
}

function renderLightbox() {
  const album = albums[curAlbum];
  lbTitle.textContent = album.name;
  lbTag.textContent = album.category;
  lbCounter.textContent = (curIdx + 1) + ' / ' + album.photos.length;
  const src = album.photos[curIdx];
  const hasPhoto = src && src.trim() !== '';
  lbMain.innerHTML = hasPhoto
    ? `<img class="lb-img" src="${src}" alt="第${curIdx + 1}张">`
    : `<div class="lb-placeholder" style="background:${album.coverColor}">${album.emoji}</div>`;
  lbFilmstrip.innerHTML = album.photos.map((p, i) => {
    const active = i === curIdx ? ' active' : '';
    const hasSrc = p && p.trim() !== '';
    return hasSrc
      ? `<img class="lb-thumb${active}" src="${p}" alt="" onclick="goTo(${i})">`
      : `<div class="lb-thumb-placeholder${active}" style="background:${album.coverColor}" onclick="goTo(${i})">${album.emoji}</div>`;
  }).join('');
  const activeThumb = lbFilmstrip.children[curIdx];
  if (activeThumb) activeThumb.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}

function goTo(i) { curIdx = i; renderLightbox(); }
function prevPhoto() { curIdx = (curIdx - 1 + albums[curAlbum].photos.length) % albums[curAlbum].photos.length; renderLightbox(); }
function nextPhoto() { curIdx = (curIdx + 1) % albums[curAlbum].photos.length; renderLightbox(); }
function closeLightbox() { lightbox.classList.remove('open'); document.body.style.overflow = ''; }

document.getElementById('lb-prev').onclick = prevPhoto;
document.getElementById('lb-next').onclick = nextPhoto;
document.getElementById('lb-close').onclick = closeLightbox;

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'ArrowLeft') prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
  if (e.key === 'Escape') closeLightbox();
});

let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? nextPhoto() : prevPhoto();
});

document.getElementById('lb-stage').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
</script>
</body>
</html>
